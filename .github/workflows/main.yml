name: GitHub Actions
on: [push]
jobs:
  build:
    runs-on: ${{ matrix.cfg.os }}
    strategy:
     fail-fast: false
     matrix:
      cfg:
      # For Ubuntu 22.04, the available compilers are specified according to
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md
      #- { os: ubuntu-22.04, cc: gcc-10, cxx: g++-10 } # 10.5.0
      - { os: ubuntu-22.04, cc: gcc-11, cxx: g++-11 } # 11.4.0
      - { os: ubuntu-22.04, cc: gcc-12, cxx: g++-12 } # 12.3.0
      - { os: ubuntu-22.04, cc: clang-13, cxx: clang++-13 } # 13.0.1
      - { os: ubuntu-22.04, cc: clang-14, cxx: clang++-14 } # 14.0.0
      - { os: ubuntu-22.04, cc: clang-15, cxx: clang++-15 } # 15.0.7
      # For Ubuntu 24.04, the available compilers are specified according to
      # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
      - { os: ubuntu-24.04, cc: gcc-12, cxx: g++-12 } # 12.3.0
      - { os: ubuntu-24.04, cc: gcc-13, cxx: g++-13 } # 13.3.0
      - { os: ubuntu-24.04, cc: gcc-14, cxx: g++-14 } # 14.2.0
      - { os: ubuntu-24.04, cc: clang-16, cxx: clang++-16 } # 16.0.6
      - { os: ubuntu-24.04, cc: clang-17, cxx: clang++-17 } # 17.0.6
      - { os: ubuntu-24.04, cc: clang-18, cxx: clang++-18 } # 18.1.3
      # For macOS 14, the available compilers are specified according to
      # https://github.com/actions/runner-images/blob/main/images/macos/macos-14-Readme.md
      - { os: macos-14, cc: gcc-13, cxx: g++-13 } # 13.4.0 
      - { os: macos-14, cc: gcc-14, cxx: g++-14 } # 14.3.0
      - { os: macos-14, cc: gcc-15, cxx: g++-15 } # 15.1.0 
      # For macOS 15, the available compilers are specified according to
      # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-Readme.md
      - { os: macos-15, cc: gcc-13, cxx: g++-13 } # 13.4.0 
      - { os: macos-15, cc: gcc-14, cxx: g++-14 } # 14.3.0 
      - { os: macos-15, cc: gcc-15, cxx: g++-15 } # 15.1.0 
      - { os: windows-2022, cc: gcc, cxx: g++, msys2_system: mingw64, msys2_arch: x86_64 }

    steps:
    - uses: actions/checkout@v2

    - uses: msys2/setup-msys2@v2
      id: msys2
      if: matrix.cfg.msys2_system != ''
      with:
        msystem: ${{matrix.cfg.msys2_system}}
        install: >-
          make
          mingw-w64-${{matrix.cfg.msys2_arch}}-gcc
          mingw-w64-${{matrix.cfg.msys2_arch}}-cmake
          mingw-w64-${{matrix.cfg.msys2_arch}}-python
          mingw-w64-${{matrix.cfg.msys2_arch}}-python-pip
    - if: matrix.cfg.msys2_system != ''
      run: |
        Add-Content $env:GITHUB_PATH "${{ steps.msys2.outputs.msys2-location }}\${{matrix.cfg.msys2_system}}\bin"
        Add-Content $env:GITHUB_PATH "${{ steps.msys2.outputs.msys2-location }}\usr\bin"

    - name: Install googletest
      run: make -f makefile/Makefile.external CC=${{ matrix.cfg.cc }} CXX=${{ matrix.cfg.cxx }}

    - name: Run tests.
      run: make -f makefile/Makefile.test CC=${{ matrix.cfg.cc }} CXX=${{ matrix.cfg.cxx }}

    # For MSYS2-based builds, use the msys shell to avoid contamination with the system's Python.
    # We want to write "shell: ${{ matrix.cfg.msys2_system && 'msys2 {0}' || 'bash' }}" to unify
    # the following two steps, but 'matrix' is not available in the context.

    - name: Test Python bindings
      if: matrix.cfg.msys2_system == ''
      run: |
        python -m venv .venv
        . .venv/bin/activate
        CC=${{ matrix.cfg.cc }} CXX=${{ matrix.cfg.cxx }} python -m pip install ./python
        python -m pip install pytest
        pytest python/tests

    - name: Test Python bindings (MSYS)
      if: matrix.cfg.msys2_system != ''
      run: |
        python -m venv .venv
        . .venv/bin/activate
        CC=${{ matrix.cfg.cc }} CXX=${{ matrix.cfg.cxx }} python -m pip install ./python
        python -m pip install pytest
        pytest python/tests
      shell: msys2 {0}

  build-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Build googletest (MSVC)
        shell: pwsh
        run: |
          $top = "${{ github.workspace }}".Replace('\', '/')
          cmake -S cmake/external -B build/external/cmake -G "Ninja Multi-Config" `
                -DTOP_DIR="$top"
          cmake --build build/external/cmake --config Release

      - name: Configure tests (MSVC)
        shell: pwsh
        run: |
          $top = "${{ github.workspace }}".Replace('\', '/')
          cmake -S cmake/test -B build/test/Release -G "Ninja Multi-Config" `
                -DTOP_DIR="$top" -DCMAKE_BUILD_TYPE=Release

      - name: Build tests (MSVC)
        shell: pwsh
        run: cmake --build build/test/Release --config Release -j

      - name: Run tests (MSVC)
        shell: pwsh
        run: ctest --test-dir build/test/Release -C Release --output-on-failure

      - name: Build application (MSVC, smoke)
        shell: pwsh
        run: |
          $top = "${{ github.workspace }}".Replace('\', '/')
          cmake -S cmake/application -B build/application/Release -G "Ninja Multi-Config" `
                -DTOP_DIR="$top" -DCMAKE_BUILD_TYPE=Release
          cmake --build build/application/Release --config Release -j

      - name: Build examples (MSVC, smoke)
        shell: pwsh
        run: |
          $top = "${{ github.workspace }}".Replace('\', '/')
          cmake -S cmake/example -B build/example/Release -G "Ninja Multi-Config" `
                -DTOP_DIR="$top" -DCMAKE_BUILD_TYPE=Release
          cmake --build build/example/Release --config Release -j

      - name: Set up Python (MSVC)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Test Python bindings (MSVC)
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          python -m pip install ./python
          python -m pip install pytest
          pytest python/tests
